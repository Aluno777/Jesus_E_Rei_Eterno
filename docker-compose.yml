version: '3.9'

services:
  web:
    build: .
    container_name: redshield-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    environment:
      - DJANGO_SECRET_KEY=mude-esta-chave-em-producao-!!-use-openssl-rand-hex-32
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,*
    # Chromium precisa de memória compartilhada suficiente
    shm_size: '512mb'
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Opcional: Nginx como reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: redshield-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./staticfiles:/static
  #   depends_on:
  #     - web

volumes:
  db:
  media:
